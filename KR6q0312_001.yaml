body:
  text: 目録序顏一齊汝勳撰蘄州資福禪寺語録蘄州北山智度禪寺語録南康軍廬山歸宗能仁禪寺語録南康軍廬山開先華藏禪寺語録南康軍廬山棲賢寶覺禪寺語録平江府陽山尊相禪寺語録平江府雙塔壽寧萬歲禪寺語録頌古法語真讚遺偈塔銘顏一齊汝勳居士撰徑山無準禪師後序淨慈北澗禪師後序無明性和尚語録序東山一脈最得人憎認草本者多作平常會奇特會某處是生機某處是死句互分巧拙俱落窠臼縱跳得出又墮解脫深坑非獨蹉過此老亦蹉過天下老和尚添得幾箇册子只益雜毒耳余因序無明語不覺饒舌怕有軟頑底為一齋懺悔也不見得淳祐癸卯上巳長洲一齋顏汝勳敬書蘄州資福禪寺語録侍者妙儼編入院指山門云萬疊峯巒秀清虗杳靄間跨門一句子擬議隔重關佛殿拈香指天指地有甚巴鼻目顧四方不知失利纍及後代兒孫以此相鈍置踞方丈電激雷奔以毒攻毒撒土拋沙拗直作曲箇裏翻身控角弓誰能背手抽金鏃法座云不知立處高多少回頭四顧白雲低等間移步毗盧頂拽轉南辰安向西拈衣云要入牯牛隊還披水牯皮全身行異類拽杷又牽犁升座拈香祝聖罷次拈香云此一瓣香昔在佛照禪師處得其體松源和尚處得其用雖然體用雙全浮沈湖海未曾有一人酬價而今一客不煩兩主爇向爐中奉為前住臨安府靈隱先師和尚用酬法乳遂斂衣就座僧問云龍象四集寶座已登學人上來請師祝聖答云一氣不言含有象萬靈何處謝無私進云如何是把定要津句師云擬議則差白雲萬里進云如何是坐斷乾坤句師云天高群象正海闊百川朝進云如何是坐斷報化佛頭句師云大用現前不存軌則進云便恁麼去時如何師云更參三參三十年僧禮拜師乃云行盡迢迢路無山不是家跨門一句子擬議隔天涯四山空闊一徑幽深樓閣崢嶸峯巒疊翠全是自家本地發明古佛家風不免高挂鉢囊拗折拄杖安家樂業鼓腹謳歌更不他求是成活計至於山禽聚集牛動尾巴虎嘯龍吟風清露白溪山雲月處處同風水鳥樹林頭頭顯露且道共樂升平一句如何話會倒把少林無孔笛逆風吹了順風吹復舉保壽開堂三聖推出一僧保壽便打師云將謂侯白更有侯黑三聖云恁麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在師云賊須賊捉保壽便歸方丈師云虎頭虎尾一時收諸人要識二大老子落處麼卓拄杖一下云風定花猶落鳥啼山更幽上堂云有語中無語達磨九年空面壁無語中有語空生巖畔花狼藉有無俱泯又且如何南斗八北斗七上堂云啞却我口禿我舌明眼衲僧難辨別遂擲下拄杖云今朝撒向諸人前須彌燈王笑不徹上堂云舉雲門示衆云天寒日短兩人共一碗師云雲門家風太儉資福則不然天寒日短三平二滿虎咬大蟲雄雞生卵且道明什麼邊事參謝知事頭首上堂云迅雷聲裏閃電光中棒喝交馳主賓互顯正恁麼時且道是誰家風月以拂子擊禪牀云數片白雲生宇宙普天無處不垂陰上堂云言發非聲舌頭無骨色前不物狐狸戀窟畢竟如何是不落聲色底句鷓鴣啼處百花香蘄州北山智度禪寺語録侍者圓澄編上堂云新梅雪裏依稀拆愛日窗前迤邐長漏泄東君好消息分明遍界不能藏且道藏不得是箇什麼卓拄杖云但得到家田地穩更無佛法可商量上堂云鳥牙絶頂結制安居包羅萬有吞却十虗且道無位真人在什麼處良久云切忌從它覓迢迢與我疏出城回上堂云往來無間動靜一源瞥然而往瞥然而還大方無內無外管甚新年舊年歸來偃臥青松下只這些兒妙不傳上堂云方挹新春又迎朱夏山不為高水不為下梅雨連綿虗空貼卦浸爛石烏龜黃梅添話烏牙峯頂浪滔天犀牛扇子增高價上堂舉寒山子詩云吾心似秋月碧潭清皎潔無物堪比倫教我如何説師云寒山子坐在解脫深坑若是北山門下打你頭破額裂上堂云秋風清秋月白鴈過長空蟬噪庭柏踢出鐵昆崘大機要頓發好肉剜瘡覷著即瞎隔山人唱太平歌元是胡笳十八拍上堂云爽氣生襟袂清飈襲四維白雲抱幽石冷淡更清奇玲瓏八面自回合峭峻一方誰敢窺因事上堂毒蛇頭上能揩癢正是吾家跳竈兒竊得這些窮伎倆白拈手裏覓便宜㘞萬仞崖頭獨足立頭長三尺知是誰上堂十五日已前一冬二冬叉手當胸十五日已後背手抽金鏃翻身控角弓正當十五日時如何風從虎兮雲從龍擡眸子過遼東南康軍廬山歸宗能仁禪寺語録侍者妙全編上堂云春行萬國春無迹臘雪消殘始見功頭頭應現處處流通木馬泥牛吼花柳撼春風上堂云春山青春水緑草茸茸花簇簇若能喪盡目前機便見廬山真面目上堂云元宵正月半是處金蓮現貪看燈明佛蹉過新羅箭以拂子擊禪牀云閃電光中聊通一線上堂云柳色含煙千葩競秀森羅萬象互顯家風無位真人橫身遍界正恁麼時如何以拂子擊禪床云鯨吞海水盡露出珊瑚枝為首座典座上堂云法社棟梁藂林綱紀全殺全活建立宗旨雙放雙收總在這裏虎嘯風生龍吟霧起擊拂子云大家扶起破砂盆無限清風來未已上堂云句中句絶露布閃電裏分緇素且道紫霄峰高鸞溪水急如何緇素以拂子擊禪牀云戴嵩牛臥緑楊陰韓幹馬嘶芳草渡上堂云向上一路滑壁立萬仞嶮石火電光鈍定乾坤句錯良久云水牯牛常甘水草麒麟只有一隻角千手大悲難摸索謝知事上堂云主中賓賓中主南山大蟲元是虎踢起眉毛著眼看閃電光中急薦取擊拂子云發機須是千鈞弩上堂云知有底人眼中著屑盡底掀翻只得一橛堪笑巴陵老古錐解道銀碗裏盛雪上堂云滿口道不得底天下祖師結舌有分滿眼不見底撞著燈籠露柱滿耳聽不聞底鐘鳴鼓響切忌啖休啖滅却臨濟正法眼破砂盆子何處著上堂云歸宗見成行貨別無單傳心要二時展鉢開單逐日痾屎送尿飢餐渴飲一般露柱燈籠大笑且道笑箇什麼毗婆尸佛早留心直至而今不得妙上堂云風蕭蕭兮疏林葉落月皎皎兮虎嘯猿啼或聞或見或悟或迷會與不會脫體全提鼻孔元是向下垂上堂云一葉落天下秋一塵起大地收明明祖師意明明百草頭相頭買帽看樓打樓拂子擊禪牀云更嫌何處不風流上堂云秋色連天淨秋花滿地香圓通門大啓切忌錯商量開爐上堂云丹霞燒木佛院主眉鬚落兩箇無孔鐵鎚彼此將錯就錯焦磚打著連底凍笑它普化搖鈴鐸上堂云雪覆千山孤峯不白突出難辨覷著則瞎鐵樹花開冰河焰發不萌枝上月三更切忌龍門遭點額上堂云搖唇鼓舌展事投機千佛出世不通懺悔歸宗知而故犯是汝諸人向什麼處著眼以拂子擊禪狀云焦巴焦巴有葉無丫長天秋水孤鶩落霞上堂歸宗無法可商量獨掇單提不覆藏有問西來端的意天寒日短夜偏長浴佛上堂云指天指地獨稱尊攪動乾坤海嶽昏自從賺殺人無數直至而今無腦門上堂云雨過長空簷頭滴滴覿面相呈人信不及信得及萬古長空元不濕上堂云一即一切一切即一拈青玉峽向焦螟眼中撮大地來如粟米粒會則事同一家不會則知我受屈上堂云獨標萬象物外宣揚卓拄杖云天長地久地久天長上堂云無作無為無説無示可以濟群類統萬同六虗融三際卓拄杖云此是吾家第一義南康軍廬山開先華藏禪寺語録侍者道隆編入院指山門云瀑布懸崖落半空等間平步廣寒宮乘時坐斷孤峯頂千聖從教立下風佛殿云祖禰不了兒孫遭纍祝著磕著無處回避不辭禮拜燒香也要相鈍置方丈云作家爐鞴本分鉗鎚不用埋兵施陷虎白拈手裏覓便宜法座云喝散白雲穿開碧落一步闊一步一著高一著升座祝聖罷據坐云未舉先知孰與論掀騰海嶽動乾坤嶮崖句裏翻身轉盤走珠兮珠走盤僧問云如何是臨濟宗師云迅雷不及掩耳進云如何是溈仰宗師云父子不相傳進云如何是雲門宗師云劒去久矣徒勞刻舟進云如何是曹洞宗師云白雲影裏怪石露流水光中古木青進云如何是法眼宗師云心外無法滿目青山進云宗派已蒙師指示向上宗乘事若何師云花須連夜發莫待曉風吹進云且道昨日歸宗長老今日開先主人畢竟如何師云兩頭俱坐斷一劒倚天寒僧禮拜復云滿天和氣匝地韶光溢目晴輝影臨萬有山花似錦澗水如藍蝶戀芳叢篆不雕之心印鶯啼谷口演不説之妙門全提鷲嶺拈花揭示西來密旨便恁麼去是處是慈氏無門無善財只此便是大安樂田地只此便是大解脫之場雖然如是共樂無為一句畢竟如何話會以拂子擊禪床云淨智莊嚴功德聚祝融峯頂萬年松復舉藥山示衆云與我喚沙彌來侍僧云喚沙彌作麼山云我有一箇折腳鐺兒教伊提上挈下師云儉生不孝義出豐年覿面提持當陽有準何故鯨吞海水盡露出珊瑚枝聖節上堂云一真含法界大用等虗空千祥如霧集萬善若雲臻卓拄杖云用祝吾皇無量壽天高無極地無窮上堂云郊原雨過春日熙熙桃紅李白發最上機啞却口落盡眉就中一曲江南好蘆管迎風撩亂吹上堂云聲前一句十方顯露佛祖不知衲僧罔措拂子擊禪床下座上堂云萬壑千巖雲霞鎖霧洞然明白覿面分付還有知時別宜底麼良久云鴈影落寒潭孤舟橫野渡上堂云毗盧師法身主縱奪臨機些子許目前分付與阿誰踢起眉毛急薦取上堂云去聖時遙人多懈怠逆則生嗔順則生愛不嗔不愛東海剪刀西番布袋解脫門頭緊著關休誇鋪席無人買良久云腦後見腮和贓捉敗上堂云一番秋雨一番涼道路無塵野菊香翻笑昔年陶令尹攢眉歸去錯商量恁麼不恁麼破鏡不重光若把拈花微笑是切忌將奴喚作郎上堂云以拄杖橫按云鼓沒絃琴復作吹笛勢云吹無孔笛共樂堯年同舜日達磨九年空面壁上堂拈拄杖云提起則天回地轉觸處光輝放下則息慮忘緣聖凡罔措不拈不放又且如何卓拄杖一下云翡翠踏翻荷葉雨鷺鷀衝破緑楊煙上堂云久雨不晴才晴又雨陰陽交泰萬物得所明明百草頭能為萬象主以拂子擊牀云覿面相呈切忌莾鹵上堂云秋風離離秋色依依秋雲淡佇秋月分輝篆不雕之心印狀似鐵牛之機阿呵呵力㘞希再三撈摝始應知上堂云月挂長空孤峯獨宿幽鳥數聲清白雲斷處續佛眼難窺拗直作曲羚羊挂角絶蹤由無限清風生八極松源和尚忌日上堂云是句亦剗非句亦剗瞞瞞頇頇生鐵門限如斯出世為人瞎却衲僧正眼子細撿點將來也是徐六擔板南康軍廬山棲賢寶覺禪寺語録侍者圓照編上堂云巢知風穴知雨此是世人知有只如世尊拈花迦葉微笑且道是什麼人知有卓拄杖云林間木馬嘶海底泥牛吼佛成道上堂云瞿曇夜半見明星碓觜挑開眼裏筋四十九年無畏説至今錯認定盤星將頭不猛帶纍三軍曹溪波浪如相似無限平人被陸沈上堂云草離離煙漠漠雨如膏雲如鶴説了也錯錯錯五老峯高徹骨寒野猿啼斷山月落上堂云天得一地得一王得一兮無等匹一得一又何必閃電光中加霹𮦷朝來細雨灑危層八面風清照紅日上堂云大包無外細入無間內外絶瑕玼古今無背面森羅萬象影中藏四聖六凡光裏現分明常在諸人前未審諸人見不見卓拄杖云鐵壁銀山通一線上堂云雪埋松徑梅著寒梢露倮倮赤灑灑獨孤標寒山逢拾得撫掌笑呵呵上堂云初三十一中九下七更不囊藏當陽拈出以拂子擊禪床云一氣轉洪鈞八方開壽域上元日上堂云心月孤圓清光皎潔吞盡十方空銀碗裏盛雪以拂子擊禪床云本光瑞如此笑倒燈明佛上堂云木犀花散一山秋更約清風作勝遊笑嗷幽香翻葉底西來祖意在枝頭沒回互興悠悠遼天鼻孔齊穿却更嫌何處不風流上堂云殺人刀活人劒劈破虗空成兩片千妖百怪盡潛蹤萬象森羅光影現艾人與門神端的見不見卓拄杖云拄杖子聊通一線解夏上堂云有結有解俱錯到底無繩自縛一夏九十日終箇箇眉鬚墮落入水長人填溝塞壑相逢只解那斯祁明眼衲僧休卜度上堂云才開口又成剩語不開口又成增語發機須是千鈞弩草店家風別翻雲又覆雨若是陶淵明攢眉便歸去上堂云松蘿影裏積翠堆中白雲為蓋流泉作琴隻影獨標巖上月不知那箇是知音耳卓朔頭蓬鬆擡眸子過遼東上堂云言語動用沒交涉非言語動用亦沒交涉傾腸倒腹為楔出楔啞却我口禿却舌明明萬里一條鐵上堂舉寒山頌秋光清淺時白鷺和煙島良哉觀世音全身入荒草點撿將來罪過不少只憑拄杖一切靠倒遂靠拄杖下座上堂云掀翻四大海踢倒須彌盧心粗膽大少實多虗夜見明星曾落節兒孫隨後受塗糊松源忌木落高秋玉露垂慎終追遠又思惟無端一世滅胡種纍及兒孫説向誰啞却口落盡眉牽犁拽杷帶水拖泥順捋虎鬚拈蝎尾白拈手裏覓便宜家肥生孝子誰是五逆兒棲賢今日以此供養松源先師且道還來歆饗也無以手搖拽云嗚咿嗚咿秋露春風消息在不知誰薦上頭機平江府陽山尊相禪寺語録侍者法洪編入院指法座云喝散白雲穿開碧落須彌燈王無處摸索上堂云深藏古寺老垂垂冷暖相諳只自知不謂使符相苦逼依然拽又牽犁覺報長老至上堂云開門待知識知識不來過知識既來過畢竟如何通信拂子擊禪床云開口不在舌頭上佇看平地起風波晚小參云控佛祖機瞎人天眼用生殺句截葛藤窠點著不來千里万里所以向上一路滑壁立萬仞嶮石火電光鈍定乾坤句錯箇是從上來垛生招箭尊相則別有條章諸佛不曾出世亦無一法與人達磨不西來二祖不得髓見佛見祖如生冤家説色説心如逢猛虎若是錦鱗赬尾底才聞恁麼舉著踢起便行大棒打不回頭誰敢正眼覷著若是鈍鳥棲蘆底一恁三三兩兩何故曾為浪子偏憐客為愛貪杯惜醉人謝知事頭首上堂云佛祖大機目前密布主中賓賓中主雲從龍風從虎卓拄杖云發機須是千鈞弩歲夜小參歲盡年窮無可不可烹露地牛燒榾柮火野菜只添一筯油滿鉢和羅唯一飽笑傲煙霞白雲風拂韶陽一曲自高歌困來一覺和衣倒淺種深耕得自由珊瑚枝頭日杲杲復舉僧問古德年窮歲盡時如何德云東村王老夜燒錢乃舉頌云東村王老夜燒錢打著南邊動北邊赤骨歷窮誇富貴日高三丈尚憨眠穹窿圓太虗至上堂云穹窿山裏老於菟一點圓明爍太虗八角磨盤空裏轉寥落林泉意自殊超物象絶名模將為胡鬚赤更有赤鬚胡上堂云舉僧問鏡清深山巖窟中還有佛法也無清云有僧問如何是深山巖窟中佛法云石頭大底大小底小或有人出來問尊相如何是深山巖窟中佛法只向他道無因甚如此只為太近乃舉頌云一人道有一人無正令全提肘後符昨夜虗空開口笑石人吞却洞庭湖上堂云離四句絶百非一言已出駟馬難追一任金烏東出徒教玉兔沈西拂子擊禪床云千鈞之弩不為鼷鼠而發機舊住至上堂云春雨如膏春雲如鶴客從天外來正是魔王腳閫外威權麒麟一角擊拂子云轉身一拶驗來端外道天魔俱膽落上堂云春山青春水緑春雨濛濛春花簇簇春光滿目畫難成春風萬里何抅束肥馬轆轆瘦馬轆轆日逐忙忙等間過些兒毒氣誰輕觸上堂云今朝四月初一萬像難逃影質馬祖升堂百丈捲席祕魔擎叉魯祖面壁喚驢作馬蝦跳不出麒麟一角尖烏龜三眼赤上堂云雲收天際杲日當空坐立儼然如何通信擊拂子云自是不歸歸便得五湖煙浪有誰爭楞嚴會上堂云八還正眼頂門開悟得門門有善財要識九旬行道處薰風依舊自南來一齊相訪上堂云舉問馬大師不與萬法為侶是什麼人師云問處如毒龍攪海答處似猛虎靠山然雖電激星馳未免總在門外且道門裏人如何話會移花兼蝶至買石得雲饒復舉頌云不與萬法為侶咬定牙關錯舉西江吸盡鐵船浮活提獰龍和角煮倒騎佛殿出三門翻手為雲覆手雨上堂云兔馬有角牛羊無角智不到處切忌道著道著後如何擊拂子云拈得鼻孔還失却為沂首座上堂云相見不揚眉雷轟閃電遲知音才側耳擬議落便宜威行閫外瞥轉機輪拍禪床一下云大千揑聚一微塵拗堂至上堂云息菴去世肉猶暖五逆還它五逆兒海湧峯頭行正令白拈誰敢覓便宜中秋上堂云舉長沙和尚道盡大地是一隻眼盡大地是箇全身盡十方世界在自己光明裏拍禪床一下云若人於此見得清風常滿座一念百千年平江府雙塔壽寧萬歲禪寺語録侍者唯道編上堂衲僧門下手擎日月遊運神通背負須彌全機敵勝移星換斗奪食驅耕又且如何拂子擊禪牀云不因汗馬功成力爭見黃河徹底清上堂云舉雪竇云十方無壁落四面亦無門畢竟向什麼處見客若道得接手句許你天上天下壽寧則不然金剛圈栗棘蓬拈來便用耀古騰今格外知音才領略四方八面起清風上堂云無語中有語名曰死句有語中無語名曰活句可謂剜肉作瘡皮穿骨露舉不顧即差牙閃電光中走烏兔上堂十五日已前風吹不入十五日已後水灑不著正當十五日時如何擊禪床云月中仙桂和根拔海底泥牛把角牽上堂十九二十人信不及拈拂子云喚作拂子則背不喚作拂子則觸而今背觸分明一句了然百億且道是那一句參上堂天寒人寒大家在這裏洗面摸著鼻喫茶濕却觜向上還有事也無擊拂子云韓信臨朝底魁首至上堂廬山華藏太湖濵碓觜挑開眼裏筋來趂壽寧爐竈熱大千獨步見鵬程上堂云智不是道心不是佛輥雪峰毬舞道吾笏且道明什麼邊事搖手云不説不説道舊至上堂二月春過半園林一樣新傍花看蝶舞近柳聽鶯吟遠客來相訪還曾悟此心林鄭珍井底種林檎今年桃李貴一顆直千金上堂云觀音菩薩將錢買糊餅放下元來是箇饅頭相席打令看樓打樓擊拂子云不風流處也風流上堂云燕語鶯吟俱談實相春風吹動桃李花淡煙疏雨籠青嶂説了也還會麼擊禪牀云切忌起模畫樣上堂云歸宗事理絶日輪正當午布袋放憨癡貓兒捉老鼠若人會得超佛越祖卓拄杖下座上堂云大道縱橫觸目成現坐微塵裏轉大法輪看看且道畢竟是左轉右轉夜來有人從湖州來接得淮南信泗州大聖道吳中石像不合一口吞却洞庭湖直得須彌倒卓海水逆流且道明什麼邊事參頌古趙州見二菴主南枝向暖北枝寒一種春風有兩般寄語高樓莫吹笛大家留取倚欄干外道問佛外道懷藏寶鏡時世尊良久為高提渾如良馬窺鞭影不覺全身陷鐵圍開口不在舌頭上明修棧道暗度陳倉刻舟猶覓劒夜雨過瀟湘大力量人擡腳不起只許老胡知不許老胡會白雲盡處是青山行人更在青山外大力量人腳下紅線不斷放兩拋三瞞神呼鬼換盆換盆誰不識你溈山運推移溈山養子沒來由叉手人前不識羞更把琵琶半遮面不令人見轉風流南泉斬貓兒當陽利劒斬狸奴刃下翻身會也無脫下草鞋頭戴出石人吞却洞庭湖法語寄顏一齊居士去月特承遣介賫香信物之貺出示教益十餘年間介注於此方得入頭處得句不凡早是著得手腳快當方見如此今既得入處如人喫茅柴酒少間又閧然而散又不見了雖然如此却已得著手腳處但只於所得之地崖將去如一座鐵壁銀山把得定作得主從此有大發明方始慶快平生又有一説若悟目前不悟自己為之有足無眼若悟自己不悟目前謂之有眼無足於此兩頭打徹百千法門無量妙義只在一毫上千變萬化到此方是大法明一切處通透古今誵訛公案更須遇人始得所以涅槃心易會差別智難明欲得透脫生死但只依門下末後一段見處崖將去於無滋味處正好著力大疑之下必有大悟十二時中具決定志必不相賺古人見七十員善知識其中只有一二具大眼目其餘具正知見而已宗乘中難得大手段底為人抽丁楔若𢬵得一生不會做將去有心做無心得終被門下了却千生百世得大自由萬丐痛自加鞭是幸雖得入頭處且喜神氣定動外魔難入但胸次有疑處追究午夜入神體究虗而靈寂而妙大休大歇無妙極深無深極妙拌一生具決定志了取此一點靈驗必不辜負只恐到無折合處却不向前亦枉用前頭工夫切不可退志無滋味處正好著力方為大力量人一切語句下却物為上逐物為下切忌隨語生解是為大病室中敲磕足仞嘗以此事之篤若是佛法門庭在諸方無有不鑒覺者更望一念不生全體作用處微細磨窮究得來方知體用雙全去住自在莫聽人口快須是自有定力始得參禪為透脫生死大事不是為參口頭禪以求衣食直須放下身心退步扣己萬不失一所謂粗餐易飽細嚼難飢未得知如喪考妣得知了亦如喪考妣胸次不明不可妄為做長老稱善知識所謂靈龜負圖自取喪身之兆切須照顧一失人身萬劫不復拚却一生不會埋頭衆底救取自己一段大光明藏今生得之百劫千生自得受用心為帝王主人若迷客得其便時時提取金剛王寶劒才有向上向下聊起斬為三段不妨性燥其或未然莫將間學解埋沒祖師心寄顏一齋閣內寂室方氏即心即佛沒誵訛不動舌頭意氣多打破虗空行活路夫妻撫掌笑呵呵付淨徹首座竹篦竹篦付了復何為佛祖當頭劈面揮尺水便能翻逆浪儘教人薦截流機沈安齊草菴號常牧尚墮功勳不自由還同死水臥泥牛何如闊進竿頭步撒手懸崖萬仞頭自贊紫霄峰下以毒攻毒撒土拋沙拗直作曲撼動四大神州拳踢掀翻地軸性禪沒興遭逢切忌望空呵囑坐斷千峰頂𩕳頭一任虗聲聽杓卜橫按吹毛全提正令毀佛謗法因邪打正有時裂轉面皮天下衲僧乞命辭世七十八年內空外空撒手便行萬古清風淳祐辛丑八月乙丑太白名山比丘迢沖敬校塔銘迪功郎溫州永嘉主簿顏汝勳撰并書朝散郎知信州軍州事方萬里篆額此道有正脈惟無半點氣息其殆庶幾知其可庶幾謂正脈在是則妄也迎之而不留捨之而不遺北雨南雲斗移星換忘存失照妙亦何立泉奔嶽頂探源皆死水雹降青天追蹤皆客塵擬顰朵頤欲噱斂色抽關轉軸乾坤為之黯黑龍天雖夙誓呵衛終無處所此師以手搖拽嗚咿久之不能自已余知為楊歧九世孫也師名慧性姓李氏達之巴渠人也混然其初不以點黑污胸臆才祝髮束包南遊適淳熙戊申歲也首謁佛照光光奇之一叩得其體師以無宜路益孜孜一時昂頭驤角揩範輝錯頂瘢足胝每甘心焉知松源嶽得於密菴傑傑得於應菴華遡而上之白雲東山皆楊歧流出也師造松源座下奉勤給侍奔走為裴回咨決地晨敲夕磕針度線引尤不唧𠺕於些子誵訛師毒深矣出世蘄之資福越兩年遷智度法社正耀湖海翕然歸宗開先棲賢為古精藍露沐雲敷此湧彼洽獅子一滴何翅散十斛驢乳師臘高矣奧林邃谷將終遁矣所至道價寶璧宗旨淵源大用脫軌則推出分常之華藏半座老作願點額於龍門時余未識師以水僧骨傳云雪覆蘆花欲暮天到撑沒底謝郎船離鈎三寸如何道海底泥牛拖角牽則師之脈有自矣贄參請禮往來叩答余不覺悚汗撲庵居士以大根器棟此道來守姑蘇勉其主陽山尊相金奏玉響主林改色部使者興敬稅駕於雙塔俊衲信友如赤子赴慈父母賴以受用者衆在在籌室非時相見靡間冰暑闡提亦有作室中多舉開口不在舌頭上大力量人為什麼擡腳不起大力量人為什麼腳根下紅絲線不斷虎踞猊座返擲橫拈撒火飛星學者株守己靈錯認鑒覺窠臼情識墮解脫坑無地容錐無錐可卓猶未夢見在其示衆曰向上一路滑壁立萬仞嶮石火電光鈍定乾坤句錯又曰心路不絶祖關不透盡是依草附木精靈大法洞明正好痛棒狐涎螢火望風剝落余之恩怨始啞者啖蘗矣師慨此道纍卵每哽涕眼目護常住口體等土木應世如童甘逆如飴履實踐真氷堅霜厲行解相應名之曰祖之謂也感微疾談笑却藥叩室候安起居如常遣某書遺某偈誨尤渠渠於余投筆澡浴趺坐而逝嘉熙改元七月二十日也年七十六茶毗舍利珠貫雪骨了聰久侍師席確志而正信併奉鬚髮歸故里建窣堵庸示般若靈驗師示何加損以余出師門請銘力甚於辭受頃不落擬議乃銘之曰楊歧正脈出廣入細白雲東山互換失利倣佛依稀終闕半偈咄破沙盆松源飲器毒流至師剔骨刳髓嗚咿嗚咿以手搖拽七鎮寶坊非即非離有赫厥後人自侈異吐吞其誰如水行地一齋居士示及無明和尚語一編炷香拜觀三嘆無已徑山師範書後序圓悟等間道出四箇字道言如枯柴道盡陳尊宿近時據曲彔木床三日五夜努得箇上堂四句偈以顛為倒以逆為順因邪打正必曰因正打邪指鹿為馬必曰指馬為鹿反是謂之順朱噫不知朱順耳此弊僅四五十年餘波末流渺不可遏開先老子提倡一編度火金虞其或變度海囊虞其或滲反覆指摘了不可得異時商確推一言半句言猶在耳今非吳下蒙也兵車會同請辟三舍淨慈北澗居簡
